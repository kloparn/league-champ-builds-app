name: Refresh build recommendations

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 960
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Refresh and upload to GCS
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: npm run refresh:builds:github

      - name: Commit incremental state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/builds-state.json.gz data/seen-matches.bin)" ]]; then
            git add data/builds-state.json.gz data/seen-matches.bin
            git commit -m "chore: refresh aggregation state"
            git push
          else
            echo "No state changes."
          fi
