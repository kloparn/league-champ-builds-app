name: Refresh build recommendations

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Refresh builds.json
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        run: npm run refresh:builds:github

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain static/builds.json data/builds-state.json data/seen-matches.txt)" ]]; then
            git add static/builds.json data/builds-state.json data/seen-matches.txt
            git commit -m "chore: refresh builds.json"
            git push
          else
            echo "No changes."
          fi
